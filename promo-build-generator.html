<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Build Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f4f1;
    --bg3: #eeece8;
    --text: #1a1a18;
    --text2: #6b6a66;
    --text3: #9e9c97;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --green: #1D9E75;
    --green-bg: #E1F5EE;
    --radius: 8px;
    --radius-lg: 12px;
    --font-mono: 'Courier New', Courier, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #282825;
      --bg3: #323230;
      --text: #f0efe9;
      --text2: #a09e99;
      --text3: #6b6a66;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --green: #5DCAA5;
      --green-bg: #085041;
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text3);
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    max-width: 960px;
    margin: 0 auto;
    overflow: hidden;
  }

  .wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  @media (max-width: 680px) {
    .wrap { grid-template-columns: 1fr; }
    .panel-left { border-right: none; border-bottom: 0.5px solid var(--border); }
  }

  .panel { padding: 1.5rem; }
  .panel-left { border-right: 0.5px solid var(--border); }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text3);
    margin: 1.25rem 0 .6rem;
  }

  .section-label:first-child { margin-top: 0; }

  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: .65rem; }

  .field label {
    font-size: 11px;
    color: var(--text2);
  }

  .field input,
  .field select,
  .field textarea {
    font-size: 12px;
    font-family: var(--font-mono);
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 9px;
    color: var(--text);
    width: 100%;
    transition: border-color .15s;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--border2);
  }

  .field textarea { resize: vertical; min-height: 54px; line-height: 1.5; }

  .date-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 6px;
    align-items: center;
  }

  .date-sep { font-size: 11px; color: var(--text3); text-align: center; }

  .naming-hint {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--font-sans);
    margin-top: 2px;
  }

  .preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: .85rem;
  }

  .preview-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .copy-btn {
    font-size: 11px;
    font-family: var(--font-sans);
    background: transparent;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 5px 12px;
    cursor: pointer;
    color: var(--text2);
    transition: all .15s;
  }

  .copy-btn:hover { background: var(--bg2); color: var(--text); }

  .copy-btn.copied {
    color: var(--green);
    border-color: var(--green);
    background: var(--green-bg);
  }

  .preview-box {
    font-size: 12px;
    font-family: var(--font-mono);
    line-height: 1.9;
    color: var(--text);
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 340px;
  }

  .preview-box .key { color: var(--text2); }
  .preview-box .empty { color: var(--text3); }

  .reset-btn {
    font-size: 11px;
    font-family: var(--font-sans);
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 12px;
    cursor: pointer;
    color: var(--text3);
    margin-top: .75rem;
    width: 100%;
    transition: all .15s;
  }

  .reset-btn:hover { color: var(--text2); border-color: var(--border2); }
</style>
</head>
<body>

<h1>Promo Build Generator</h1>

<div class="card">
  <div class="wrap">
    <div class="panel panel-left">

      <div class="section-label">Promo details</div>

      <div class="field">
        <label>Promo type</label>
        <select id="promoType">
          <option>Direct Mail</option>
          <option>Community Engagement</option>
          <option>Cooking Classes</option>
          <option>Deal of the Day</option>
          <option>Member Only Offer</option>
          <option>Other</option>
        </select>
      </div>

      <div class="field">
        <label>Build type</label>
        <select id="buildType">
          <option>Discount taken at register</option>
          <option>% off taken at register</option>
          <option>$ off taken at register</option>
          <option>BOGO</option>
          <option>Buy X Get Y</option>
          <option>Other</option>
        </select>
      </div>

      <div class="field">
        <label>Participating stores</label>
        <select id="stores">
          <option>All</option>
          <option>DT Corner Market</option>
          <option>View Ridge</option>
          <option>Greenlake</option>
          <option>Issaquah</option>
          <option>Fremont</option>
          <option>Redmond</option>
          <option>Edmonds</option>
          <option>Greenlake Village</option>
          <option>Columbia City</option>
          <option>Bothell</option>
          <option>Burien</option>
          <option>Ballard</option>
          <option>West Seattle</option>
          <option>Bellevue</option>
          <option>Kirkland</option>
          <option>Central District</option>
        </select>
      </div>

      <div class="section-label">Dates</div>

      <div class="field">
        <label>Date range</label>
        <div class="date-row">
          <input type="date" id="dateStart">
          <span class="date-sep">→</span>
          <input type="date" id="dateEnd">
        </div>
      </div>

      <div class="section-label">Deal info</div>

      <div class="field">
        <label>Department</label>
        <select id="dept">
          <option>All</option>
          <option>BWS</option>
          <option>HBC</option>
          <option>Meat/Sea</option>
          <option>Produce</option>
          <option>Deli</option>
          <option>Supplements</option>
          <option>Body Care</option>
        </select>
      </div>

      <div class="field">
        <label>Coupon number</label>
        <input type="text" id="coupon" placeholder="e.g. 2 00090000">
      </div>

      <div class="field">
        <label>Deal description</label>
        <select id="deal">
          <option>$5 off $15 Produce with coupon present</option>
          <option>$5 off $25 Body Care with coupon present</option>
          <option>$5 off $25 Deli with coupon present</option>
          <option>$5 off $25 Supplements with coupon present</option>
          <option>$10 off $50 Shop with coupon present</option>
          <option>$5 off $25 Meat/Sea with coupon present</option>
        </select>
      </div>

      <div class="field">
        <label>Transaction limits</label>
        <select id="txLimits">
          <option>Limit one coupon per transaction. Does not combine with other offers. Staff discount does not stack.</option>
          <option>No transaction limit.</option>
          <option>Other</option>
        </select>
      </div>

      <div class="field">
        <label>Budget to charge to</label>
        <select id="budget">
          <option>Merchandising Promotion to COGs.</option>
          <option>Marketing Budget.</option>
          <option>Vendor Funded.</option>
          <option>Other</option>
        </select>
      </div>

      <div class="section-label">Naming</div>

      <div class="field">
        <label>Promo code / identifier</label>
        <input type="text" id="promoCode" placeholder="e.g. DM7">
      </div>

      <div class="field">
        <label>Naming (auto-generated — editable)</label>
        <input type="text" id="naming" placeholder="Will auto-fill...">
        <span class="naming-hint" id="namingHint">Fill in dates, deal & dept to auto-generate</span>
      </div>

      <button class="reset-btn" onclick="resetForm()">Clear all fields</button>

    </div>

    <div class="panel">
      <div class="preview-header">
        <span class="preview-title">Email preview</span>
        <button class="copy-btn" id="copyBtn" onclick="copyEmail()">Copy</button>
      </div>
      <div class="preview-box" id="preview">Fill in the fields to generate your email...</div>
    </div>
  </div>
</div>

<script>
  const ids = ['promoType','buildType','stores','dateStart','dateEnd','dept','coupon','deal','txLimits','budget','promoCode','naming'];
  let namingEdited = false;

  const dealShortLabels = {
    '$5 off $15 Produce with coupon present':     '$5 off Produce',
    '$5 off $25 Body Care with coupon present':   '$5 off Body Care',
    '$5 off $25 Deli with coupon present':        '$5 off Deli',
    '$5 off $25 Supplements with coupon present': '$5 off Supplements',
    '$10 off $50 Shop with coupon present':       '$10 off Shop',
    '$5 off $25 Meat/Sea with coupon present':    '$5 off Meat/Sea',
  };

  function fmtDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    return m + '.' + day + '.' + y.slice(2);
  }

  function dateRange() {
    const s = document.getElementById('dateStart').value;
    const e = document.getElementById('dateEnd').value;
    if (!s && !e) return '';
    if (s && !e) return fmtDate(s);
    if (!s && e) return fmtDate(e);
    return fmtDate(s) + '-' + fmtDate(e);
  }

  function autoNaming() {
    const dates = dateRange();
    const code = document.getElementById('promoCode').value.trim();
    const deal = document.getElementById('deal').value.trim();
    const shortDeal = dealShortLabels[deal] || deal;

    if (!dates && !code && !deal) return '';

    const parts = [dates, code, shortDeal].filter(Boolean);
    return parts.join(' ');
  }

  document.getElementById('naming').addEventListener('input', () => { namingEdited = true; });

  function v(id) { return document.getElementById(id).value.trim(); }

  function update() {
    const auto = autoNaming();
    if (!namingEdited && auto) document.getElementById('naming').value = auto;
    document.getElementById('namingHint').textContent = auto ? 'Auto: ' + auto : 'Fill in dates, code & deal to auto-generate';

    const dates = dateRange();
    const rows = [
      ['PROMO TYPE', v('promoType')],
      ['BUILD TYPE', v('buildType')],
      ['PARTICIPATING STORES', v('stores')],
      ['DATES', dates],
      ['DEPARTMENT', v('dept')],
      ['COUPON', v('coupon')],
      ['DEAL', v('deal')],
      ['TRANSACTION LIMITS', v('txLimits')],
      ['BUDGET TO CHARGE TO', v('budget')],
      ['NAMING', 'Please name the Promo Basket Analysis tool "' + v('naming') + '"'],
    ];

    document.getElementById('preview').innerHTML = rows
      .map(([k, val]) => `<span class="key">${k}:</span> ${val || '<span class="empty">—</span>'}`)
      .join('\n');
  }

  function copyEmail() {
    const dates = dateRange();
    const text = [
      'PROMO TYPE: ' + v('promoType'),
      'BUILD TYPE: ' + v('buildType'),
      'PARTICIPATING STORES: ' + v('stores'),
      'DATES: ' + dates,
      'DEPARTMENT: ' + v('dept'),
      'COUPON: ' + v('coupon'),
      'DEAL: ' + v('deal'),
      'TRANSACTION LIMITS: ' + v('txLimits'),
      'BUDGET TO CHARGE TO: ' + v('budget'),
      'NAMING: Please name the Promo Basket Analysis tool "' + v('naming') + '"',
    ].join('\n');

    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function resetForm() {
    ['promoType','buildType','stores','dept','deal','txLimits','budget'].forEach(id => {
      document.getElementById(id).selectedIndex = 0;
    });
    ['dateStart','dateEnd','coupon','promoCode','naming'].forEach(id => {
      document.getElementById(id).value = '';
    });
    namingEdited = false;
    update();
  }

  ids.forEach(id => document.getElementById(id).addEventListener('input', update));
  update();
</script>

</body>
</html>
